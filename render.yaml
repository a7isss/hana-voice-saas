services:
  # API Service (Main Gateway)
  - type: web
    name: hana-voice-api
    env: python
    plan: free
    region: frankfurt
    buildCommand: |
      cd api-service && 
      pip install -r requirements.txt &&
      echo "✅ API Service dependencies installed"
    startCommand: cd api-service && python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FREEPBX_HOST
        sync: false
        optional: true
      - key: FREEPBX_USERNAME
        sync: false
        optional: true
      - key: FREEPBX_PASSWORD
        sync: false
        optional: true
    healthCheckPath: /health
    autoDeploy: true

  # Voice Processing Service
  - type: web
    name: hana-voice-service
    env: python
    plan: free
    region: frankfurt
    buildCommand: |
      cd voice-service && 
      pip install -r requirements.txt &&
      echo "✅ Voice Service dependencies installed"
    startCommand: cd voice-service && python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SUPABASE_URL
        fromService:
          name: hana-voice-api
          type: web
          envVarName: SUPABASE_URL
      - key: SUPABASE_KEY
        fromService:
          name: hana-voice-api
          type: web
          envVarName: SUPABASE_KEY
    healthCheckPath: /health
    autoDeploy: true

  # Data Processing Service
  - type: web
    name: hana-data-service
    env: python
    plan: free
    region: frankfurt
    buildCommand: |
      cd data-service && 
      pip install -r requirements.txt &&
      echo "✅ Data Service dependencies installed"
    startCommand: cd data-service && python -m uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        fromService:
          name: hana-voice-api
          type: web
          envVarName: SUPABASE_URL
      - key: SUPABASE_KEY
        fromService:
          name: hana-voice-api
          type: web
          envVarName: SUPABASE_KEY
    healthCheckPath: /health
    autoDeploy: true

  # Frontend (Next.js)
  - type: web
    name: hana-voice-frontend
    env: node
    plan: free
    region: frankfurt
    buildCommand: |
      cd frontend && 
      npm install && 
      npm run build &&
      echo "✅ Frontend built successfully"
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: hana-voice-api
          type: web
          envVarName: RENDER_EXTERNAL_URL
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true

databases:
  - name: hana-voice-db
    plan: free
    region: frankfurt
    databaseName: hana_voice
    user: hana_user

# Global environment variables for all services
envVars:
  - key: ENVIRONMENT
    value: production
  - key: LOG_LEVEL
    value: INFO
  - key: DEFAULT_LANGUAGE
    value: ar
  - key: DEFAULT_VOICE
    value: nova
  - key: DEFAULT_SPEED
    value: "0.95"
  - key: TIMEZONE
    value: Asia/Riyadh

# Service discovery and auto-configuration
serviceDiscovery:
  enabled: true
  apiService: hana-voice-api
  frontendService: hana-voice-frontend

# Build optimization
buildSettings:
  cacheEnabled: true
  buildCachePath: /tmp/build-cache
  nodeVersion: 18
  pythonVersion: 3.11

# Health check configuration
healthChecks:
  timeoutSeconds: 30
  intervalSeconds: 60
  maxFailures: 3

# Auto-scaling (for future use)
# autoScaling:
#   minInstances: 1
#   maxInstances: 3
#   targetCPU: 70
#   targetMemory: 512

# Custom domains (optional - uncomment when ready)
# domains:
#   - hana-voice.com
#   - www.hana-voice.com

# Maintenance cron jobs (optional - uncomment when ready)
# cronJobs:
#   - name: cleanup-old-audio
#     schedule: "0 2 * * *"  # Daily at 2 AM
#     command: cd api-service && python -c "from src.storage.supabase_client import cleanup_old_audio; cleanup_old_audio()"

# Deployment hooks
deployHooks:
  preDeploy:
    - name: validate-environment
      command: echo "Validating environment variables..."
  postDeploy:
    - name: health-check
      command: curl -f https://hana-voice-api.onrender.com/health || exit 1
    - name: frontend-check
      command: curl -f https://hana-voice-frontend.onrender.com/ || exit 1
